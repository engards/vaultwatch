# vaultwatch example configuration
# Copy this file to vaultwatch.yaml and adjust values for your environment.

vault:
  # Address of your Vault server (required)
  address: "https://vault.example.com:8200"

  # Vault token with read access to secrets/leases you want to monitor.
  # Alternatively, set the VAULT_TOKEN environment variable.
  token: ""

  # (Optional) Vault namespace for Vault Enterprise
  namespace: ""

  # (Optional) Path to a PEM-encoded CA certificate for TLS verification
  ca_cert: ""

# How often vaultwatch polls Vault for secret/lease status.
# Minimum value: 5s
poll_interval: 60s

alerting:
  # Emit a WARNING alert when a secret/lease expires within this duration.
  warn_threshold: 168h     # 7 days

  # Emit a CRITICAL alert when a secret/lease expires within this duration.
  critical_threshold: 24h  # 1 day

  # (Optional) Slack incoming webhook URL to post alerts.
  # Leave empty to disable Slack notifications.
  slack_webhook_url: ""
