# VaultWatch example configuration
# Copy to vaultwatch.yaml and adjust as needed.

vault:
  # Address of the Vault server (overridden by VAULT_ADDR env var)
  address: "https://vault.example.com"
  # Vault token (overridden by VAULT_TOKEN env var)
  token: ""

monitor:
  # Paths to monitor for secret expiration
  paths:
    - "secret/data/db/password"
    - "secret/data/api/key"
  # How often to poll Vault (e.g. 30s, 5m)
  interval: "5m"
  # Warn when a secret expires within this window
  warn_threshold: "72h"
  # Critical alert when a secret expires within this window
  critical_threshold: "24h"

alert:
  # Output format: table | json
  format: "table"
  # Minimum level to display/notify: info | warn | critical
  min_level: "warn"

webhook:
  # Optional webhook URL to POST alerts to (leave empty to disable)
  url: ""
  # Optional extra HTTP headers (e.g. for authentication)
  headers:
    # X-Api-Key: "your-api-key"
